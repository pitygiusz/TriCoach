<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriCoach - My Workouts</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

</head>

<body>
  <div class="app-shell">

    <div class="main-area">

      <header class="topbar">
        <button onclick="window.location.href='index.html'" class="hamburger" aria-label="Go back">←</button>

        <div class="title-group">
          <span class="app-label">TriCoach</span>
          <h1>My Workouts</h1>
        </div>
      </header>

      <div class="action-bar" id="filterBar">
        <button class="action-pill active" data-type="">All Disciplines</button>
        <button class="action-pill" data-type="swim">🏊 Swim</button>
        <button class="action-pill" data-type="ride">🚴 Ride</button>
        <button class="action-pill" data-type="run">🏃 Run</button>
        <button class="action-pill" data-type="other">🏋️ Other</button>
      </div>

      <main class="feed">
        <div id="workoutsContainer" class="posts-container">
          <div class="empty-state">Loading your workouts…</div>
        </div>
      </main>

    </div>

    <!-- ── Sidebar ───────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebarHid">
      <div class="sidebar-card" id="profileSidebarCard">
        <h2>Profile</h2>
        <div class="profile-card" id="profileCard">
          <button class="profileBtn" onclick="window.location.href='profile.html'" aria-label="View profile">
            <img src="https://i.pravatar.cc/80?img=47" alt="Profile" />
          </button>
          <div>
            <strong>Jane Doe</strong>
            <span>@janedoe</span>
          </div>
        </div>
        <div id="profileAuthButtons" style="margin-top: 14px; display: flex; gap: 8px;"></div>
      </div>

      <div class="sidebar-card" id="progressSidebarCard">
        <h2>Progress</h2>
        <ul id="progressOptionsList" style="list-style: none; padding: 0; margin: 0; display: grid; gap: 12px;">
          <li style="cursor:pointer;color:var(--text);" onclick="window.location.href='workouts.html'">🏃 My Workouts</li>
          <li style="cursor:pointer;color:var(--text);" onclick="window.location.href='ai-analysis.html'">🔮 AI Analyzer</li>
        </ul>
      </div>

      <div class="sidebar-card" id="friendsSidebarCard">
        <h2>Friends</h2>
        <div style="margin-bottom: 12px; display: flex; gap: 8px;">
          <input type="text" id="followUsernameInput" placeholder="Username..." style="flex: 1; padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-strong); color: var(--text); font-family: inherit; font-size: 0.9rem;" />
          <button onclick="followUserByUsername()" class="action-pill active" style="padding: 8px 16px; border-radius: 12px; border: none; font-size: 0.9rem; font-weight: bold; cursor: pointer;">Follow</button>
        </div>
        <ul id="friendsList" style="list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; color: var(--muted); font-size: 0.95rem;">
          <li>No followed athletes yet</li>
        </ul>
      </div>
    </aside>

  </div>

  <script>
    try {
      if (typeof firebase !== 'undefined' && !firebase.apps.length) {
        const config = window.__FIREBASE_CONFIG__;
        if (config && config.apiKey) {
          firebase.initializeApp(config);
        } else {
          console.warn('🔥 Firebase config missing or incomplete');
        }
      }
    } catch (e) {
      console.warn('🔥 Firebase init error:', e.message);
    }

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const workoutsContainer = document.getElementById('workoutsContainer');
    const profileCard = document.getElementById('profileCard');
    const profileAuthButtons = document.getElementById('profileAuthButtons');
    const progressOptionsList = document.getElementById('progressOptionsList');

    let currentFilterType = "";

    // ─── Firebase Helper ──────────────────────────────────────────────────────
    function isFirebaseReady() {
      try {
        return typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0;
      } catch (e) {
        return false;
      }
    }

    function getCurrentUserId() {
      return sessionStorage.getItem('firebaseUid') || null;
    }

    function getCurrentDisplayName() {
      return sessionStorage.getItem('firebaseDisplayName') || 'Athlete';
    }

    async function getAuthHeaders() {
      if (isFirebaseReady()) {
        try {
          const user = firebase.auth().currentUser;
          if (user) {
            const token = await user.getIdToken();
            sessionStorage.setItem('firebaseToken', token);
            sessionStorage.setItem('firebaseUid', user.uid);
            sessionStorage.setItem('firebaseDisplayName', user.displayName || user.email);
            sessionStorage.setItem('firebaseEmail', user.email);
            return { 'Authorization': `Bearer ${token}` };
          }
        } catch (e) {}
      }
      const token = sessionStorage.getItem('firebaseToken');
      if (!token) return {};
      return { 'Authorization': `Bearer ${token}` };
    }

    // ─── Update Profile Sidebar ────────────────────────────────────────────────
    async function updateProfileSidebar() {
      const uid = sessionStorage.getItem('firebaseUid');
      const name = sessionStorage.getItem('firebaseDisplayName') || 'Athlete';
      const avatar = `https://i.pravatar.cc/80?u=${encodeURIComponent(uid || 'default')}`;

      if (profileCard) {
        profileCard.innerHTML = `
          <button class="profileBtn" onclick="window.location.href='profile.html'" aria-label="View profile">
            <img src="${avatar}" alt="${name}" />
          </button>
          <div>
            <strong>${name}</strong>
            <span>${uid ? '@' + uid.substring(0, 8) : 'Not logged in'}</span>
          </div>
        `;
      }

      if (profileAuthButtons) {
        if (uid) {
          profileAuthButtons.innerHTML = `
            <button onclick="logoutUser()" style="flex: 1; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-strong); color: var(--text); cursor: pointer; font-size: 0.85rem; font-weight: 500;">🚪 Logout</button>
          `;
        } else {
          profileAuthButtons.innerHTML = `
            <button onclick="window.location.href='index.html'" style="flex: 1; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-strong); color: var(--gold); cursor: pointer; font-size: 0.85rem; font-weight: 500;">🔑 Log In</button>
          `;
        }
      }

      if (progressOptionsList) {
        if (uid) {
          progressOptionsList.innerHTML = `
            <li style="cursor:pointer;color:var(--text);" onclick="window.location.href='workouts.html'">🏃 My Workouts</li>
            <li style="cursor:pointer;color:var(--text);" onclick="window.location.href='ai-analysis.html'">🔮 AI Analyzer</li>
          `;
        } else {
          progressOptionsList.innerHTML = `
            <li style="color:var(--muted);font-size:0.9rem;">Log in to track progress</li>
          `;
        }
      }

      const friendsList = document.getElementById('friendsList');
      if (friendsList) {
        if (uid) {
          try {
            const followingRes = await fetch(`/api/following/${uid}`);
            if (followingRes.ok) {
              const data = await followingRes.json();
              const following = data.following || [];
              if (following.length > 0) {
                friendsList.innerHTML = following.map(f => 
                  `<li style="display: flex; align-items: center; gap: 8px; cursor: pointer;" onclick="window.location.href='profile.html?uid=${f.followingId}'">
                    <span style="font-size: 1.2rem;">🏃</span>
                    <span style="color: var(--text); font-weight: 500;">${f.username}</span>
                  </li>`
                ).join('');
              } else {
                friendsList.innerHTML = '<li style="font-size:0.9rem; color:var(--muted);">No followed athletes yet</li>';
              }
            }
          } catch (e) {
            friendsList.innerHTML = '<li style="font-size:0.9rem; color:var(--muted);">Error loading friends</li>';
          }
        } else {
          friendsList.innerHTML = '<li style="font-size:0.9rem; color:var(--muted);">Log in to see friends</li>';
        }
      }
    }

    window.followUserByUsername = async function followUserByUsername() {
      const usernameInput = document.getElementById('followUsernameInput');
      const username = usernameInput ? usernameInput.value.trim() : '';
      if (!username) {
        alert('Please enter a username to follow!');
        return;
      }

      const currentUid = getCurrentUserId();

      try {
        const userRes = await fetch(`/api/users/by-username/${encodeURIComponent(username)}`);
        if (!userRes.ok) {
          if (userRes.status === 404) {
            throw new Error(`User "${username}" not found.`);
          }
          throw new Error(`Failed to lookup user. Status: ${userRes.status}`);
        }
        const targetUser = await userRes.json();

        if (targetUser.uid === currentUid) {
          alert("You cannot follow yourself!");
          return;
        }

        const authHeaders = await getAuthHeaders();
        const res = await fetch('/api/follow', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify({
            follower_id: currentUid,
            following_id: targetUser.uid,
          })
        });
        if (!res.ok) throw new Error(`Status: ${res.status}`);

        alert(`Successfully followed @${username}!`);
        if (usernameInput) usernameInput.value = '';
        
        updateProfileSidebar();
      } catch (err) {
        alert(`Could not follow user: ${err.message}`);
      }
    };

    window.logoutUser = function logoutUser() {
      if (isFirebaseReady()) {
        firebase.auth().signOut().then(function() {
          sessionStorage.clear();
          window.location.replace('login.html');
        }).catch(function(e) {
          console.warn('Logout failed:', e);
        });
      } else {
        sessionStorage.clear();
        window.location.replace('login.html');
      }
    };

    // ─── Fetch and Render Workouts ──────────────────────────────────────────
    function getDisciplineEmoji(type) {
      const t = type.toLowerCase();
      if (t === 'swim' || t === 'swimming') return '🏊';
      if (t === 'ride' || t === 'bike' || t === 'cycling') return '🚴';
      if (t === 'run' || t === 'running') return '🏃';
      return '🏋️';
    }

    async function loadWorkouts() {
      const uid = getCurrentUserId();
      if (!uid) {
        window.location.replace('login.html');
        return;
      }

      workoutsContainer.innerHTML = '<div class="empty-state">Loading workouts…</div>';

      try {
        const authHeaders = await getAuthHeaders();
        let url = `/api/workouts/${uid}`;
        if (currentFilterType) {
          url += `?type=${currentFilterType}`;
        }

        const res = await fetch(url, {
          headers: { 'Content-Type': 'application/json', ...authHeaders }
        });
        if (!res.ok) throw new Error(`Status: ${res.status}`);
        
        const data = await res.json();
        const workouts = data.workouts || [];
        
        if (workouts.length === 0) {
          workoutsContainer.innerHTML = `<div class="empty-state">No workouts logged under this filter discipline yet.</div>`;
          return;
        }

        workoutsContainer.innerHTML = '';
        workouts.forEach(w => {
          const card = document.createElement('article');
          card.className = 'post-card';
          const emoji = getDisciplineEmoji(w.type);
          const date = w.timestamp ? new Date(w.timestamp).toLocaleDateString(undefined, { dateStyle: 'medium' }) : 'Logged';
          const distanceText = w.distance_km ? ` · ${parseFloat(w.distance_km).toFixed(2)} km` : '';
          
          card.innerHTML = `
            <header style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%;">
              <div style="display: flex; align-items: center;">
                <div style="font-size: 2.2rem; margin-right: 12px;">${emoji}</div>
                <div class="post-author">
                  <strong>${w.type.toUpperCase()} workout</strong>
                  <span>${date}</span>
                </div>
              </div>
              <button onclick="deleteWorkout('${w.id}')" style="background: transparent; border: none; font-size: 1.25rem; padding: 4px 8px; color: var(--muted); cursor: pointer;" aria-label="Delete workout">🗑️</button>
            </header>
            <p style="font-size: 1.15rem; margin-bottom: 8px; margin-top: 12px;">
              Logged <strong>${w.duration_minutes}</strong> minutes of activity${distanceText}.
            </p>
          `;
          workoutsContainer.appendChild(card);
        });
      } catch (err) {
        workoutsContainer.innerHTML = `<div class="error-state">Could not load workouts: ${err.message}</div>`;
      }
    }

    window.deleteWorkout = async function deleteWorkout(workoutId) {
      if (!confirm('Are you sure you want to delete this workout?')) return;
      try {
        const authHeaders = await getAuthHeaders();
        const res = await fetch(`/api/workouts/${workoutId}`, {
          method: 'DELETE',
          headers: authHeaders
        });
        if (!res.ok) throw new Error(`Status: ${res.status}`);
        alert('Workout deleted successfully!');
        loadWorkouts();
      } catch (err) {
        alert(`Could not delete workout: ${err.message}`);
      }
    };

    // ─── Filter Pill Handling ─────────────────────────────────────────────────
    document.querySelectorAll('#filterBar .action-pill').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#filterBar .action-pill').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilterType = btn.getAttribute('data-type');
        loadWorkouts();
      });
    });

    // ─── Bootstrap ────────────────────────────────────────────────────────────
    if (isFirebaseReady()) {
      firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
          sessionStorage.setItem('firebaseUid', user.uid);
          sessionStorage.setItem('firebaseDisplayName', user.displayName || user.email);
          sessionStorage.setItem('firebaseEmail', user.email);
        } else {
          sessionStorage.clear();
          window.location.replace('login.html');
        }
        updateProfileSidebar();
        loadWorkouts();
      });
    } else {
      updateProfileSidebar();
      loadWorkouts();
    }
  </script>
</body>
</html>
