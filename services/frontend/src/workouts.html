<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriCoach - My Workouts</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

</head>

<body>
  <div class="app-shell">

    <div class="main-area">

      <header class="topbar">
        <button onclick="window.location.href='index.html'" class="hamburger" aria-label="Go back">←</button>

        <div class="title-group">
          <span class="app-label">TriCoach</span>
          <h1>My Workouts</h1>
        </div>
      </header>

      <div class="action-bar" id="filterBar">
        <button class="action-pill active" data-type="">All Disciplines</button>
        <button class="action-pill" data-type="swim">🏊 Swim</button>
        <button class="action-pill" data-type="ride">🚴 Ride</button>
        <button class="action-pill" data-type="run">🏃 Run</button>
        <button class="action-pill" data-type="other">🏋️ Other</button>
        <button id="openCreateTrainingBtn" class="action-pill active" style="margin-left: auto;">
          <div>
            <strong>Log a training</strong>
          </div>
        </button>
      </div>

      <main class="feed">
        <div id="workoutsContainer" class="posts-container">
          <div class="empty-state">Loading your workouts…</div>
        </div>
      </main>

    </div>

    <!-- ── Sidebar ───────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebarHid"></aside>

  </div>

  <div id="createTrainingModal" class="modal-overlay hidden">
    <div class="modal-content">
      <header class="modal-header">
        <h2>Log Training</h2>
        <button id="closeTrainingModalBtn" class="menu-close" aria-label="Close">×</button>
      </header>
      <div class="modal-body">
        <div class="workout-selector">
          <label for="trainingType">Type</label>
          <select id="trainingType">
            <option value="">Select a type</option>
            <option value="run">Run</option>
            <option value="ride">Ride</option>
            <option value="swim">Swim</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="workout-selector">
          <label for="trainingDuration">Duration (minutes)</label>
          <input id="trainingDuration" type="number" min="1" placeholder="e.g. 45" />
        </div>
        <div class="workout-selector">
          <label for="trainingDistance">Distance (km)</label>
          <input id="trainingDistance" type="number" min="0" step="0.01" placeholder="e.g. 5.00" />
        </div>
      </div>
      <footer class="modal-actions">
        <button id="submitTrainingBtn" class="action-pill active">Save Training</button>
      </footer>
    </div>
  </div>

  <script src="shell.js"></script>
  <script>
    try {
      if (typeof firebase !== 'undefined' && !firebase.apps.length) {
        const config = window.__FIREBASE_CONFIG__;
        if (config && config.apiKey) {
          firebase.initializeApp(config);
        } else {
          console.warn('🔥 Firebase config missing or incomplete');
        }
      }
    } catch (e) {
      console.warn('🔥 Firebase init error:', e.message);
    }

    // ─── DOM refs ─────────────────────────────────────────────────────────────
    const workoutsContainer = document.getElementById('workoutsContainer');
    const openCreateTrainingBtn = document.getElementById('openCreateTrainingBtn');
    const createTrainingModal = document.getElementById('createTrainingModal');
    const closeTrainingModalBtn = document.getElementById('closeTrainingModalBtn');
    const submitTrainingBtn = document.getElementById('submitTrainingBtn');
    const trainingType = document.getElementById('trainingType');
    const trainingDuration = document.getElementById('trainingDuration');
    const trainingDistance = document.getElementById('trainingDistance');

    let currentFilterType = "";

    // ─── Fetch and Render Workouts ──────────────────────────────────────────
    function getDisciplineEmoji(type) {
      const t = type.toLowerCase();
      if (t === 'swim' || t === 'swimming') return '🏊';
      if (t === 'ride' || t === 'bike' || t === 'cycling') return '🚴';
      if (t === 'run' || t === 'running') return '🏃';
      return '🏋️';
    }

    async function loadWorkouts() {
      const uid = getCurrentUserId();
      if (!uid) {
        window.location.replace('login.html');
        return;
      }

      workoutsContainer.innerHTML = '<div class="empty-state">Loading workouts…</div>';

      try {
        const authHeaders = await getAuthHeaders();
        let url = `/api/workouts/${uid}`;
        if (currentFilterType) {
          url += `?type=${currentFilterType}`;
        }

        const res = await fetch(url, {
          headers: { 'Content-Type': 'application/json', ...authHeaders }
        });
        if (!res.ok) throw new Error(`Status: ${res.status}`);
        
        const data = await res.json();
        const workouts = data.workouts || [];
        
        if (workouts.length === 0) {
          workoutsContainer.innerHTML = `<div class="empty-state">No workouts logged under this filter discipline yet.</div>`;
          return;
        }

        workoutsContainer.innerHTML = '';
        workouts.forEach(w => {
          const card = document.createElement('article');
          card.className = 'post-card';
          const emoji = getDisciplineEmoji(w.type);
          const date = w.timestamp ? new Date(w.timestamp).toLocaleDateString(undefined, { dateStyle: 'medium' }) : 'Logged';
          const distanceText = w.distance_km ? ` · ${parseFloat(w.distance_km).toFixed(2)} km` : '';
          
          card.innerHTML = `
            <header style="display: flex; justify-content: space-between; align-items: flex-start; width: 100%;">
              <div style="display: flex; align-items: center;">
                <div style="font-size: 2.2rem; margin-right: 12px;">${emoji}</div>
                <div class="post-author">
                  <strong>${w.type.toUpperCase()} workout</strong>
                  <span>${date}</span>
                </div>
              </div>
              <button onclick="deleteWorkout('${w.id}')" style="background: transparent; border: none; font-size: 1.25rem; padding: 4px 8px; color: var(--muted); cursor: pointer;" aria-label="Delete workout">🗑️</button>
            </header>
            <p style="font-size: 1.15rem; margin-bottom: 8px; margin-top: 12px;">
              Logged <strong>${w.duration_minutes}</strong> minutes of activity${distanceText}.
            </p>
          `;
          workoutsContainer.appendChild(card);
        });
      } catch (err) {
        workoutsContainer.innerHTML = `<div class="error-state">Could not load workouts: ${err.message}</div>`;
      }
    }

    window.deleteWorkout = async function deleteWorkout(workoutId) {
      if (!confirm('Are you sure you want to delete this workout?')) return;
      try {
        const authHeaders = await getAuthHeaders();
        const res = await fetch(`/api/workouts/${workoutId}`, {
          method: 'DELETE',
          headers: authHeaders
        });
        if (!res.ok) throw new Error(`Status: ${res.status}`);
        alert('Workout deleted successfully!');
        loadWorkouts();
      } catch (err) {
        alert(`Could not delete workout: ${err.message}`);
      }
    };

    // ─── Training modal ───────────────────────────────────────────────────────────
    openCreateTrainingBtn.addEventListener('click', () => {
      createTrainingModal.classList.remove('hidden');
    });

    closeTrainingModalBtn.addEventListener('click', () => {
      createTrainingModal.classList.add('hidden');
    });

    submitTrainingBtn.addEventListener('click', async () => {
      const type     = trainingType.value.trim();
      const duration = trainingDuration.value.trim();
      const distance = trainingDistance.value.trim();

      if (!type)              { alert('Select a training type.');                return; }
      if (!duration || +duration <= 0) { alert('Enter a valid duration (> 0 minutes).'); return; }

      try {
        const authHeaders = await getAuthHeaders();
        const res = await fetch('/api/workouts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify({
            user_id:          getCurrentUserId(),
            type,
            duration_minutes: parseInt(duration, 10),
            distance_km:      distance ? parseFloat(distance) : null,
          })
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(errText || `Status: ${res.status}`);
        }

        trainingType.value     = '';
        trainingDuration.value = '';
        trainingDistance.value = '';
        createTrainingModal.classList.add('hidden');

        alert('Training logged successfully!');
        loadWorkouts();
      } catch (err) {
        alert(`Could not save training: ${err.message}`);
      }
    });

    // ─── Filter Pill Handling ─────────────────────────────────────────────────
    document.querySelectorAll('#filterBar .action-pill[data-type]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('#filterBar .action-pill[data-type]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilterType = btn.getAttribute('data-type');
        loadWorkouts();
      });
    });

    // ─── Bootstrap ────────────────────────────────────────────────────────────
    if (isFirebaseReady()) {
      firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
          sessionStorage.setItem('firebaseUid', user.uid);
          sessionStorage.setItem('firebaseDisplayName', user.displayName || user.email);
          sessionStorage.setItem('firebaseEmail', user.email);
        } else {
          sessionStorage.clear();
          window.location.replace('login.html');
        }
        updateProfileSidebar();
        loadWorkouts();
      });
    } else {
      updateProfileSidebar();
      loadWorkouts();
    }
  </script>
</body>
</html>
