<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriCoach - Profile</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script>
    try {
      if (window.__FIREBASE_CONFIG__ && window.__FIREBASE_CONFIG__.apiKey) {
        firebase.initializeApp(window.__FIREBASE_CONFIG__);
      } else {
        console.warn('🔥 Firebase config missing or incomplete');
      }
    } catch (e) {
      console.warn('🔥 Firebase init error:', e.message);
    }
  </script>
</head>
<body>
    <div class="app-shell">
        <div class="main-area">
            <header class="topbar">
                <button onclick="window.location.href='index.html'" class="hamburger" aria-label="Go back">←</button>
                <div class="title-group">
                  <span class="app-label">TriCoach</span>
                  <h1>User Profile</h1>
                </div>
            </header>
            
            <div class="sidebar-card" style="display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; padding: 40px 20px;" id="profileInfo">
                <img id="profileAvatar" src="https://i.pravatar.cc/150?img=47" alt="Profile" style="width: 120px; height: 120px; border-radius: 999px; object-fit: cover; border: 3px solid var(--primary);" />
                <div>
                    <h2 id="profileName" style="margin: 0 0 8px; font-size: 1.8rem; color: var(--text);">Loading...</h2>
                    <span id="profileEmail" style="color: var(--muted); font-size: 1.1rem;">@loading</span>
                </div>
                <p style="margin: 0; max-width: 500px; line-height: 1.6;">Triathlon enthusiast sharing training progress.</p>
                
                <div class="action-bar" style="justify-content: center; width: 100%; margin-top: 10px; flex-wrap: wrap; gap: 8px;">
                    <div class="action-pill"><strong id="postCount">0</strong> Posts</div>
                    <div class="action-pill"><strong id="followingCount">0</strong> Following</div>
                    <div class="action-pill"><strong id="followersCount">0</strong> Followers</div>
                </div>

                <div id="friendsDetailContainer" style="display: none; width: 100%; max-width: 500px; background: var(--bg); padding: 16px; border-radius: 16px; border: 1px solid var(--border); margin-top: 10px; font-size: 0.95rem; text-align: left;">
                    <div style="margin-bottom: 10px;">
                        <strong style="color: var(--primary);">Following:</strong>
                        <div id="followingListNames" style="color: var(--text); margin-top: 4px;">None</div>
                    </div>
                    <div>
                        <strong style="color: var(--primary);">Followed by:</strong>
                        <div id="followersListNames" style="color: var(--text); margin-top: 4px;">None</div>
                    </div>
                </div>

                <button id="profileFollowBtn" class="action-pill active" style="margin-top: 10px; display: none;"></button>
                <button id="profileLogoutBtn" class="action-pill active" onclick="logoutUser()" style="margin-top: 10px; display: none;">🚪 Logout</button>
            </div>
            
            <div class="action-bar">
                <button class="action-pill active">Recent Posts</button>
            </div>
            
            <main class="feed">
                <div class="posts-container" id="userPosts">
                    <div class="empty-state">Loading your posts...</div>
                </div>
            </main>
        </div>
        
        <aside class="sidebar" id="sidebarHid">
          <div class="sidebar-card" id="profileSidebarCard">
            <h2>Profile</h2>
            <div class="profile-card" id="sidebarProfileCard">
              <button class="profileBtn" onclick="window.location.href='profile.html'" aria-label="View profile">
                <img src="https://i.pravatar.cc/80?img=47" alt="Profile" />
              </button>
              <div>
                <strong>Loading...</strong>
                <span>@loading</span>
              </div>
            </div>
            <div id="profileAuthButtons" style="margin-top: 14px; display: flex; gap: 8px;"></div>
          </div>
    
          <div class="sidebar-card" id="progressSidebarCard">
            <h2>Progress</h2>
            <ul id="progressOptionsList" style="list-style: none; padding: 0; margin: 0; display: grid; gap: 12px;">
              <li style="cursor:pointer;color:var(--text);" onclick="window.location.href='workouts.html'">🏃 My Workouts</li>
              <li style="cursor:pointer;color:var(--text);" onclick="window.location.href='ai-analysis.html'">🔮 AI Analyzer</li>
            </ul>
          </div>
          
          <div class="sidebar-card" id="friendsSidebarCard">
            <h2>Friends</h2>
            <div style="margin-bottom: 12px; display: flex; gap: 8px;">
              <input type="text" id="followUsernameInput" placeholder="Username..." style="flex: 1; padding: 8px 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-strong); color: var(--text); font-family: inherit; font-size: 0.9rem;" />
              <button onclick="followUserByUsername()" class="action-pill active" style="padding: 8px 16px; border-radius: 12px; border: none; font-size: 0.9rem; font-weight: bold; cursor: pointer;">Follow</button>
            </div>
            <ul id="friendsList" style="list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; color: var(--muted); font-size: 0.95rem;">
              <li>No followed athletes yet</li>
            </ul>
          </div>
        </aside>
    </div>

    <script>
      const sidebarProfileCard = document.getElementById('sidebarProfileCard');
      const profileAuthButtons = document.getElementById('profileAuthButtons');
      const progressOptionsList = document.getElementById('progressOptionsList');

      function isFirebaseReady() {
        try {
          return typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0;
        } catch (e) {
          return false;
        }
      }

      function getCurrentUserId() {
        return sessionStorage.getItem('firebaseUid') || null;
      }

      function getCurrentDisplayName() {
        return sessionStorage.getItem('firebaseDisplayName') || 'Athlete';
      }

      async function getAuthHeaders() {
        if (isFirebaseReady()) {
          try {
            const user = firebase.auth().currentUser;
            if (user) {
              const token = await user.getIdToken();
              sessionStorage.setItem('firebaseToken', token);
              sessionStorage.setItem('firebaseUid', user.uid);
              sessionStorage.setItem('firebaseDisplayName', user.displayName || user.email);
              sessionStorage.setItem('firebaseEmail', user.email);
              return { 'Authorization': `Bearer ${token}` };
            }
          } catch (e) {}
        }
        const token = sessionStorage.getItem('firebaseToken');
        if (!token) return {};
        return { 'Authorization': `Bearer ${token}` };
      }

      async function followUser(followerId, followingId) {
        try {
          const authHeaders = await getAuthHeaders();
          const res = await fetch('/api/follow', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeaders },
            body: JSON.stringify({ follower_id: followerId, following_id: followingId })
          });
          if (!res.ok) throw new Error(`Status: ${res.status}`);
          alert('Successfully followed user!');
          loadUserProfile();
        } catch (err) {
          alert(`Could not follow user: ${err.message}`);
        }
      }

      async function unfollowUser(followerId, followingId) {
        try {
          const authHeaders = await getAuthHeaders();
          const res = await fetch('/api/unfollow', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeaders },
            body: JSON.stringify({ follower_id: followerId, following_id: followingId })
          });
          if (!res.ok) throw new Error(`Status: ${res.status}`);
          alert('Successfully unfollowed user!');
          loadUserProfile();
        } catch (err) {
          alert(`Could not unfollow user: ${err.message}`);
        }
      }

      window.followUserByUsername = async function followUserByUsername() {
        const usernameInput = document.getElementById('followUsernameInput');
        const username = usernameInput ? usernameInput.value.trim() : '';
        if (!username) {
          alert('Please enter a username to follow!');
          return;
        }

        const currentUid = getCurrentUserId();

        try {
          const userRes = await fetch(`/api/users/by-username/${encodeURIComponent(username)}`);
          if (!userRes.ok) {
            if (userRes.status === 404) {
              throw new Error(`User "${username}" not found.`);
            }
            throw new Error(`Failed to lookup user. Status: ${userRes.status}`);
          }
          const targetUser = await userRes.json();

          if (targetUser.uid === currentUid) {
            alert("You cannot follow yourself!");
            return;
          }

          const authHeaders = await getAuthHeaders();
          const res = await fetch('/api/follow', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeaders },
            body: JSON.stringify({
              follower_id: currentUid,
              following_id: targetUser.uid,
            })
          });
          if (!res.ok) throw new Error(`Status: ${res.status}`);

          alert(`Successfully followed @${username}!`);
          if (usernameInput) usernameInput.value = '';
          
          updateProfileSidebar();
          
          const urlParams = new URLSearchParams(window.location.search);
          const urlUid = urlParams.get('uid');
          const sessionUid = sessionStorage.getItem('firebaseUid');
          const targetUid = urlUid || sessionUid;
          if (targetUid) {
            await loadFollowDetails(targetUid);
            const logoutBtn = document.getElementById('profileLogoutBtn');
            const followBtn = document.getElementById('profileFollowBtn');
            if (sessionUid && targetUid !== sessionUid) {
              const followingRes = await fetch(`/api/following/${sessionUid}`);
              if (followingRes.ok) {
                const data = await followingRes.json();
                const following = data.following || [];
                const isFollowing = following.some(f => f.followingId === targetUid);
                updateFollowButtonState(followBtn, isFollowing, sessionUid, targetUid);
              }
            }
          }
        } catch (err) {
          alert(`Could not follow user: ${err.message}`);
        }
      };

      function updateFollowButtonState(btn, isFollowing, sessionUid, targetUid) {
        if (isFollowing) {
          btn.textContent = 'Unfollow';
          btn.style.background = 'transparent';
          btn.style.border = '1px solid var(--border)';
          btn.style.color = 'var(--text)';
          btn.onclick = () => unfollowUser(sessionUid, targetUid);
        } else {
          btn.textContent = 'Follow';
          btn.style.background = 'var(--primary)';
          btn.style.border = 'none';
          btn.style.color = 'white';
          btn.onclick = () => followUser(sessionUid, targetUid);
        }
        btn.style.display = 'inline-block';
      }

      async function updateProfileSidebar() {
        const uid = sessionStorage.getItem('firebaseUid');
        const name = sessionStorage.getItem('firebaseDisplayName') || 'Athlete';
        const avatar = `https://i.pravatar.cc/80?u=${encodeURIComponent(uid || 'default')}`;

        if (sidebarProfileCard) {
          sidebarProfileCard.innerHTML = `
            <button class="profileBtn" onclick="window.location.href='profile.html'" aria-label="View profile">
              <img src="${avatar}" alt="${name}" />
            </button>
            <div>
              <strong>${name}</strong>
              <span>${uid ? '@' + uid.substring(0, 8) : 'Not logged in'}</span>
            </div>
          `;
        }

        if (profileAuthButtons) {
          if (uid) {
            profileAuthButtons.innerHTML = `
              <button onclick="logoutUser()" style="flex: 1; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-strong); color: var(--text); cursor: pointer; font-size: 0.85rem; font-weight: 500;">🚪 Logout</button>
            `;
          } else {
            profileAuthButtons.innerHTML = `
              <button onclick="window.location.href='index.html'" style="flex: 1; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-strong); color: var(--gold); cursor: pointer; font-size: 0.85rem; font-weight: 500;">🔑 Log In</button>
            `;
          }
        }

        if (progressOptionsList) {
          if (uid) {
            progressOptionsList.innerHTML = `
              <li style="cursor:pointer;color:var(--text);" onclick="window.location.href='workouts.html'">🏃 My Workouts</li>
              <li style="cursor:pointer;color:var(--text);" onclick="window.location.href='ai-analysis.html'">🔮 AI Analyzer</li>
            `;
          } else {
            progressOptionsList.innerHTML = `
              <li style="color:var(--muted);font-size:0.9rem;">Log in to track progress</li>
            `;
          }
        }

        const friendsList = document.getElementById('friendsList');
        if (friendsList) {
          if (uid) {
            try {
              const followingRes = await fetch(`/api/following/${uid}`);
              if (followingRes.ok) {
                const data = await followingRes.json();
                const following = data.following || [];
                if (following.length > 0) {
                  friendsList.innerHTML = following.map(f => 
                    `<li style="display: flex; align-items: center; gap: 8px; cursor: pointer;" onclick="window.location.href='profile.html?uid=${f.followingId}'">
                      <span style="font-size: 1.2rem;">🏃</span>
                      <span style="color: var(--text); font-weight: 500;">${f.username}</span>
                    </li>`
                  ).join('');
                } else {
                  friendsList.innerHTML = '<li style="font-size:0.9rem; color:var(--muted);">No followed athletes yet</li>';
                }
              }
            } catch (e) {
              friendsList.innerHTML = '<li style="font-size:0.9rem; color:var(--muted);">Error loading friends</li>';
            }
          } else {
            friendsList.innerHTML = '<li style="font-size:0.9rem; color:var(--muted);">Log in to see friends</li>';
          }
        }
      }

      async function loadFollowDetails(uid) {
        try {
          const followingRes = await fetch(`/api/following/${uid}`);
          const followersRes = await fetch(`/api/followers/${uid}`);
          
          let followingNames = 'None';
          let followersNames = 'None';
          let followingCount = 0;
          let followersCount = 0;

          if (followingRes.ok) {
            const data = await followingRes.json();
            const following = data.following || [];
            followingCount = following.length;
            if (followingCount > 0) {
              followingNames = following.map(f => '@' + f.username).join(', ');
            }
          }
          
          if (followersRes.ok) {
            const data = await followersRes.json();
            const followers = data.followers || [];
            followersCount = followers.length;
            if (followersCount > 0) {
              followersNames = followers.map(f => '@' + f.username).join(', ');
            }
          }

          document.getElementById('followingCount').textContent = followingCount;
          document.getElementById('followersCount').textContent = followersCount;
          document.getElementById('followingListNames').textContent = followingNames;
          document.getElementById('followersListNames').textContent = followersNames;
          document.getElementById('friendsDetailContainer').style.display = 'block';
        } catch (err) {
          console.error('Error loading follow details:', err);
        }
      }

      async function loadUserProfile() {
        const profileName = document.getElementById('profileName');
        const profileEmail = document.getElementById('profileEmail');
        const profileAvatar = document.getElementById('profileAvatar');
        const postCount = document.getElementById('postCount');
        const logoutBtn = document.getElementById('profileLogoutBtn');
        const followBtn = document.getElementById('profileFollowBtn');

        const urlParams = new URLSearchParams(window.location.search);
        const urlUid = urlParams.get('uid');
        const sessionUid = sessionStorage.getItem('firebaseUid');

        if (!sessionUid) {
          window.location.replace('login.html');
          return;
        }

        const targetUid = urlUid || sessionUid;

        // Show logout button only if viewing own profile
        if (sessionUid && targetUid === sessionUid) {
          logoutBtn.style.display = 'inline-block';
          followBtn.style.display = 'none';
        } else if (sessionUid) {
          logoutBtn.style.display = 'none';
          try {
            const followingRes = await fetch(`/api/following/${sessionUid}`);
            if (followingRes.ok) {
              const data = await followingRes.json();
              const following = data.following || [];
              const isFollowing = following.some(f => f.followingId === targetUid);
              updateFollowButtonState(followBtn, isFollowing, sessionUid, targetUid);
            } else {
              followBtn.style.display = 'none';
            }
          } catch (e) {
            console.error('Error fetching following status:', e);
            followBtn.style.display = 'none';
          }
        } else {
          logoutBtn.style.display = 'none';
          followBtn.style.display = 'none';
        }

        try {
          // 1. Fetch Profile Data
          const profileRes = await fetch(`/api/users/${targetUid}/profile`);
          if (profileRes.ok) {
            const profileData = await profileRes.json();
            profileName.textContent = profileData.username || 'Athlete';
            profileEmail.textContent = '@' + (profileData.email ? profileData.email.split('@')[0] : 'athlete');
            profileAvatar.src = `https://i.pravatar.cc/150?u=${encodeURIComponent(targetUid)}`;
          } else {
            // Fallback default info
            profileName.textContent = 'Athlete';
            profileEmail.textContent = '@athlete';
            profileAvatar.src = `https://i.pravatar.cc/150?u=${encodeURIComponent(targetUid)}`;
          }

          // 2. Load Follow Details
          await loadFollowDetails(targetUid);

          // 3. Load Posts
          const postsRes = await fetch('/api/posts');
          if (postsRes.ok) {
            const posts = await postsRes.json();
            const userPosts = Array.isArray(posts) ? posts.filter(p => p.userId === targetUid) : [];
            postCount.textContent = userPosts.length;
            const container = document.getElementById('userPosts');
            if (userPosts.length === 0) {
              container.innerHTML = '<div class="empty-state">No posts yet. Share your training!</div>';
            } else {
              container.innerHTML = '';
              userPosts.forEach(post => {
                const card = document.createElement('article');
                card.className = 'post-card';
                card.innerHTML = '<p>' + (post.content || '') + '</p><div class="post-meta"><span>' + (post.likes || 0) + ' likes</span></div>';
                container.appendChild(card);
              });
            }
          }
        } catch (err) {
          console.error(err);
          document.getElementById('userPosts').innerHTML = '<div class="empty-state">Error loading profile data</div>';
        }

        updateProfileSidebar();
      }

      window.logoutUser = function logoutUser() {
        if (isFirebaseReady()) {
          firebase.auth().signOut().then(function() {
            sessionStorage.clear();
            window.location.replace('login.html');
          }).catch(function(e) {
            console.warn('Logout failed:', e);
          });
        } else {
          sessionStorage.clear();
          window.location.replace('login.html');
        }
      };

      if (isFirebaseReady()) {
        firebase.auth().onAuthStateChanged(function(user) {
          if (user) {
            sessionStorage.setItem('firebaseUid', user.uid);
            sessionStorage.setItem('firebaseDisplayName', user.displayName || user.email);
            sessionStorage.setItem('firebaseEmail', user.email);
          } else {
            sessionStorage.clear();
            window.location.replace('login.html');
          }
          loadUserProfile();
        });
      } else {
        loadUserProfile();
      }
    </script>
</body>
</html>
