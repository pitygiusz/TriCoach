<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriCoach - Profile</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script>
    try {
      if (window.__FIREBASE_CONFIG__ && window.__FIREBASE_CONFIG__.apiKey) {
        firebase.initializeApp(window.__FIREBASE_CONFIG__);
      } else {
        console.warn('🔥 Firebase config missing or incomplete');
      }
    } catch (e) {
      console.warn('🔥 Firebase init error:', e.message);
    }
  </script>
</head>
<body>
    <div class="app-shell">
        <div class="main-area">
            <header class="topbar">
                <button onclick="window.location.href='index.html'" class="hamburger" aria-label="Go back">←</button>
                <div class="title-group">
                  <span class="app-label">TriCoach</span>
                  <h1>User Profile</h1>
                </div>
            </header>
            
            <div class="sidebar-card" style="display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; padding: 40px 20px;" id="profileInfo">
                <img id="profileAvatar" src="https://i.pravatar.cc/150?img=47" alt="Profile" style="width: 120px; height: 120px; border-radius: 999px; object-fit: cover; border: 3px solid var(--primary);" />
                <div>
                    <h2 id="profileName" style="margin: 0 0 8px; font-size: 1.8rem; color: var(--text);">Loading...</h2>
                    <span id="profileEmail" style="color: var(--muted); font-size: 1.1rem;">@loading</span>
                </div>
                <p style="margin: 0; max-width: 500px; line-height: 1.6;">Triathlon enthusiast sharing training progress.</p>
                
                <div class="action-bar" style="justify-content: center; width: 100%; margin-top: 10px;">
                    <div class="action-pill"><strong id="postCount">0</strong> Posts</div>
                </div>
                <button class="action-pill active" onclick="logoutUser()" style="margin-top: 10px;">🚪 Logout</button>
            </div>
            
            <div class="action-bar">
                <button class="action-pill active">Recent Posts</button>
            </div>
            
            <main class="feed">
                <div class="posts-container" id="userPosts">
                    <div class="empty-state">Loading your posts...</div>
                </div>
            </main>
        </div>
        
        <aside class="sidebar" id="sidebarHid">
          <div class="sidebar-card">
            <h2>About</h2>
            <ul>
              <li id="profileJoined" style="color: var(--muted); font-size: 0.95rem; line-height: 1.5;">Firebase Auth</li>
            </ul>
          </div>
        </aside>
    </div>

    <script>
      function isFirebaseReady() {
        try {
          return typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0;
        } catch (e) {
          return false;
        }
      }

      function loadProfileFallback() {
        const profileName = document.getElementById('profileName');
        const profileEmail = document.getElementById('profileEmail');
        const profileAvatar = document.getElementById('profileAvatar');
        const postCount = document.getElementById('postCount');

        const uid = sessionStorage.getItem('firebaseUid');
        const name = sessionStorage.getItem('firebaseDisplayName') || 'Guest';
        const email = sessionStorage.getItem('firebaseEmail') || 'Not logged in';

        profileName.textContent = name;
        profileEmail.textContent = email;
        profileAvatar.src = 'https://i.pravatar.cc/150?u=' + encodeURIComponent(uid || 'guest');

        if (!uid) {
          document.getElementById('profileJoined').textContent = 'Please log in';
        }

        if (uid) {
          fetch('/api/posts')
            .then(r => r.json())
            .then(posts => {
              const userPosts = Array.isArray(posts) ? posts.filter(p => p.userId === uid) : [];
              postCount.textContent = userPosts.length;
              const container = document.getElementById('userPosts');
              if (userPosts.length === 0) {
                container.innerHTML = '<div class="empty-state">No posts yet. Share your training!</div>';
              } else {
                container.innerHTML = '';
                userPosts.forEach(post => {
                  const card = document.createElement('article');
                  card.className = 'post-card';
                  card.innerHTML = '<p>' + (post.content || '') + '</p><div class="post-meta"><span>' + (post.likes || 0) + ' likes</span></div>';
                  container.appendChild(card);
                });
              }
            })
            .catch(() => {
              document.getElementById('userPosts').innerHTML = '<div class="empty-state">Could not load posts</div>';
            });
        }
      }

      window.logoutUser = function logoutUser() {
        if (isFirebaseReady()) {
          firebase.auth().signOut().then(function() {
            sessionStorage.clear();
            window.location.href = 'index.html';
          }).catch(function(e) {
            alert('Logout failed: ' + e.message);
          });
        } else {
          sessionStorage.clear();
          window.location.href = 'index.html';
        }
      };

      if (isFirebaseReady()) {
        firebase.auth().onAuthStateChanged(function(user) {
          const profileName = document.getElementById('profileName');
          const profileEmail = document.getElementById('profileEmail');
          const profileAvatar = document.getElementById('profileAvatar');
          const postCount = document.getElementById('postCount');

          if (user) {
            sessionStorage.setItem('firebaseUid', user.uid);
            sessionStorage.setItem('firebaseDisplayName', user.displayName || user.email);
            sessionStorage.setItem('firebaseEmail', user.email);

            profileName.textContent = user.displayName || 'Athlete';
            profileEmail.textContent = '@' + user.email;
            profileAvatar.src = 'https://i.pravatar.cc/150?u=' + encodeURIComponent(user.uid);

            const uid = user.uid;
            fetch('/api/posts')
              .then(r => r.json())
              .then(posts => {
                const userPosts = Array.isArray(posts) ? posts.filter(p => p.userId === uid) : [];
                postCount.textContent = userPosts.length;
                const container = document.getElementById('userPosts');
                if (userPosts.length === 0) {
                  container.innerHTML = '<div class="empty-state">No posts yet. Share your training!</div>';
                } else {
                  container.innerHTML = '';
                  userPosts.forEach(post => {
                    const card = document.createElement('article');
                    card.className = 'post-card';
                    card.innerHTML = '<p>' + (post.content || '') + '</p><div class="post-meta"><span>' + (post.likes || 0) + ' likes</span></div>';
                    container.appendChild(card);
                  });
                }
              })
              .catch(() => {
                document.getElementById('userPosts').innerHTML = '<div class="empty-state">Could not load posts</div>';
              });
          } else {
            sessionStorage.clear();
            loadProfileFallback();
          }
        });
      } else {
        loadProfileFallback();
      }
    </script>
</body>
</html>
