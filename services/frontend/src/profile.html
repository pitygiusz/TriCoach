<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriCoach - Profile</title>
  <link rel="stylesheet" href="styles.css" /> 
</head>
<body>
    <div class="app-shell">
        <div class="main-area">
            <header class="topbar">
                <button onclick="window.location.href='index.html'" class="hamburger" aria-label="Go back">←</button>
                <div class="title-group">
                  <span class="app-label">TriCoach</span>
                  <h1>User Profile</h1>
                </div>
            </header>
            
            <div class="sidebar-card" style="display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; padding: 40px 20px;" id="profileInfo">
                <img id="profileAvatar" src="https://i.pravatar.cc/150?img=47" alt="Profile" style="width: 120px; height: 120px; border-radius: 999px; object-fit: cover; border: 3px solid var(--primary);" />
                <div>
                    <h2 id="profileName" style="margin: 0 0 8px; font-size: 1.8rem; color: var(--text);">Loading...</h2>
                    <span id="profileEmail" style="color: var(--muted); font-size: 1.1rem;">@loading</span>
                </div>
                <p style="margin: 0; max-width: 500px; line-height: 1.6;">Triathlon enthusiast sharing training progress.</p>
                
                <div class="action-bar" style="justify-content: center; width: 100%; margin-top: 10px;">
                    <div class="action-pill"><strong id="postCount">0</strong> Posts</div>
                </div>
                <button class="action-pill active" onclick="logoutUser()" style="margin-top: 10px;">🚪 Logout</button>
            </div>
            
            <div class="action-bar">
                <button class="action-pill active">Recent Posts</button>
            </div>
            
            <main class="feed">
                <div class="posts-container" id="userPosts">
                    <div class="empty-state">Loading your posts...</div>
                </div>
            </main>
        </div>
        
        <aside class="sidebar" id="sidebarHid">
          <div class="sidebar-card">
            <h2>About</h2>
            <ul>
              <li id="profileJoined" style="color: var(--muted); font-size: 0.95rem; line-height: 1.5;">Firebase Auth</li>
            </ul>
          </div>
        </aside>
    </div>

    <script>
      // Load profile from session storage
      const uid = sessionStorage.getItem('firebaseUid');
      const name = sessionStorage.getItem('firebaseDisplayName') || 'Guest';
      const email = sessionStorage.getItem('firebaseEmail') || 'Not logged in';

      if (!uid) {
        document.getElementById('profileName').textContent = 'Not logged in';
        document.getElementById('profileEmail').textContent = 'Please log in first';
        document.getElementById('profileAvatar').src = 'https://i.pravatar.cc/150?img=1';
      } else {
        document.getElementById('profileName').textContent = name;
        document.getElementById('profileEmail').textContent = '@' + uid.substring(0, 8);
        document.getElementById('profileAvatar').src = 'https://i.pravatar.cc/150?u=' + encodeURIComponent(uid);
        
        // Count posts
        fetch('/api/posts')
          .then(r => r.json())
          .then(posts => {
            const userPosts = Array.isArray(posts) ? posts.filter(p => p.userId === uid) : [];
            document.getElementById('postCount').textContent = userPosts.length;
            const container = document.getElementById('userPosts');
            if (userPosts.length === 0) {
              container.innerHTML = '<div class="empty-state">No posts yet. Share your training!</div>';
            } else {
              container.innerHTML = '';
              userPosts.forEach(post => {
                const card = document.createElement('article');
                card.className = 'post-card';
                card.innerHTML = '<p>' + (post.content || '') + '</p><div class="post-meta"><span>' + (post.likes || 0) + ' likes</span></div>';
                container.appendChild(card);
              });
            }
          })
          .catch(() => {
            document.getElementById('userPosts').innerHTML = '<div class="empty-state">Could not load posts</div>';
          });
      }
    </script>
</body>
</html>
