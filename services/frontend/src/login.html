<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriCoach - Welcome!</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

  <style>
    /* Specific styles for centering the login card using your existing CSS vars */
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .login-card h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }
    .login-card p {
      color: var(--muted);
      margin: 0 0 24px;
      line-height: 1.5;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }
    .auth-form input {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 18px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      width: 100%;
    }
    .choice-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .auth-button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .auth-button.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .auth-button.secondary.selected {
      background: var(--primary);
      color: white;
      border-color: transparent;
    }
    .auth-button:hover {
      opacity: 0.9;
    }
    .hidden {
      display: none;
    }
    .muted-text {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 8px;
    }
    .error-msg {
      color: #ef4444;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
  </style>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>TriCoach</h1>
      <p>Your ultimate triathlon training companion. Log in to track your progress.</p>

      <div class="auth-form">
        <div id="errorMessage" class="error-msg"></div>

        <div id="choiceButtons" class="choice-buttons">
          <button id="loginModeBtn" type="button" class="auth-button secondary">Log In</button>
          <button id="signupModeBtn" type="button" class="auth-button secondary">Sign Up</button>
        </div>

        <form id="authForm" class="auth-fields hidden">
          <h2 id="formTitle" style="margin:0;">Log in to TriCoach</h2>

          <div id="nameFieldsGroup" class="hidden" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
              <label for="firstNameInput" style="color: var(--muted); font-size: 0.9rem; margin-bottom: 4px; display: block;">First Name</label>
              <input type="text" id="firstNameInput" placeholder="John" />
            </div>
            <div>
              <label for="lastNameInput" style="color: var(--muted); font-size: 0.9rem; margin-bottom: 4px; display: block;">Last Name</label>
              <input type="text" id="lastNameInput" placeholder="Doe" />
            </div>
          </div>

          <div id="usernameGroup" class="hidden">
            <label for="usernameInput" style="color: var(--muted); font-size: 0.9rem; margin-bottom: 4px; display: block;">Username</label>
            <input type="text" id="usernameInput" placeholder="alphanumericOnly" />
          </div>

          <div>
            <label id="emailLabel" for="emailInput" style="color: var(--muted); font-size: 0.9rem; margin-bottom: 4px; display: block;">Email or Username</label>
            <input type="text" id="emailInput" placeholder="athlete@example.com or username" required />
          </div>

          <div>
            <label for="passwordInput" style="color: var(--muted); font-size: 0.9rem; margin-bottom: 4px; display: block;">Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••" required />
          </div>

          <button id="submitBtn" class="auth-button" type="submit">Continue</button>
          <div id="switchPrompt" class="muted-text"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    try {
      if (typeof firebase !== 'undefined' && !firebase.apps.length) {
        const config = window.__FIREBASE_CONFIG__;
        if (config && config.apiKey) {
          firebase.initializeApp(config);
        } else {
          console.warn('🔥 Firebase config missing or incomplete');
        }
      }
    } catch (e) {
      console.warn('🔥 Firebase init error:', e.message);
    }

    const loginModeBtn = document.getElementById('loginModeBtn');
    const signupModeBtn = document.getElementById('signupModeBtn');
    const authForm = document.getElementById('authForm');
    const usernameGroup = document.getElementById('usernameGroup');
    const usernameInput = document.getElementById('usernameInput');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const submitBtn = document.getElementById('submitBtn');
    const formTitle = document.getElementById('formTitle');
    const switchPrompt = document.getElementById('switchPrompt');
    const errorMessage = document.getElementById('errorMessage');
    const nameFieldsGroup = document.getElementById('nameFieldsGroup');
    const firstNameInput = document.getElementById('firstNameInput');
    const lastNameInput = document.getElementById('lastNameInput');

    let authMode = null;

    function clearMessage() {
      errorMessage.textContent = '';
      errorMessage.style.display = 'none';
    }

    function showError(msg) {
      errorMessage.textContent = msg || 'Unable to continue. Please try again.';
      errorMessage.style.display = 'block';
    }

    function isFirebaseReady() {
      try {
        return typeof firebase !== 'undefined' && firebase.apps && firebase.apps.length > 0;
      } catch (e) {
        return false;
      }
    }

    function setAuthMode(mode) {
      authMode = mode;
      loginModeBtn.classList.toggle('selected', mode === 'login');
      signupModeBtn.classList.toggle('selected', mode === 'signup');
      authForm.classList.remove('hidden');
      usernameGroup.classList.toggle('hidden', mode !== 'signup');
      nameFieldsGroup.classList.toggle('hidden', mode !== 'signup');
      
      const emailLabel = document.getElementById('emailLabel');
      if (mode === 'signup') {
        nameFieldsGroup.style.display = 'grid';
        usernameGroup.style.display = 'block';
        usernameGroup.type = 'text';

        emailLabel.textContent = 'Email';
        emailInput.type = 'email';
        emailInput.placeholder = 'athlete@example.com';
      } else {
        nameFieldsGroup.style.display = 'none'; 
        usernameGroup.style.display = 'none';

        emailLabel.textContent = 'Email or Username';
        emailInput.type = 'text';
        emailInput.placeholder = 'athlete@example.com or username';
      }

      formTitle.textContent = mode === 'signup' ? 'Create your account' : 'Log in to TriCoach';
      submitBtn.textContent = mode === 'signup' ? 'Sign Up' : 'Log In';
      switchPrompt.textContent = mode === 'signup'
        ? 'Already registered? Click Log In to sign in.'
        : 'New to TriCoach? Click Sign Up to create an account.';
      clearMessage();
    }

    async function handleAuthSubmit(event) {
      event.preventDefault();
      clearMessage();

      if (!authMode) {
        showError('Please choose Log In or Sign Up first.');
        return;
      }

      let emailOrUser = emailInput.value.trim();
      const password = passwordInput.value;
      const username = usernameInput.value.trim();
      const firstName = firstNameInput.value.trim();
      const lastName = lastNameInput.value.trim();

      if (!emailOrUser || !password) {
        showError('Please complete authentication fields.');
        return;
      }

      if (authMode === 'signup') {
        if (!username || !firstName || !lastName) {
          showError('Please fill out all identity and profile fields.');
          return;
        }
        const usernameRegex = /^[a-zA-Z0-9]+$/;
        if (!usernameRegex.test(username)) {
          showError('Username cannot have spaces or special characters.');
          return;
        }
      }

      try {
        let targetedEmail = emailOrUser;

        // Resolve username input into an email address if it doesn't match an email pattern
        if (authMode === 'login' && !emailOrUser.includes('@')) {
          const resolveRes = await fetch(`/api/users/resolve-email?username=${encodeURIComponent(emailOrUser)}`);
          if (!resolveRes.ok) {
            throw new Error('Invalid credentials or username does not exist.');
          }
          const data = await resolveRes.json();
          targetedEmail = data.email;
        }

        if (!isFirebaseReady()) {
          // Backend Fallback Mode
          if (authMode === 'signup') {
            const response = await fetch('/api/users/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: targetedEmail, username, password, firstName, lastName }),
            });
            if (!response.ok) {
              const data = await response.json().catch(() => ({}));
              throw new Error(data.error || 'Registration failed');
            }
            showError('Registered successfully! Switching to Login...');
            setAuthMode('login');
          } else {
            const response = await fetch('/api/users/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: emailOrUser, password }),
            });
            if (!response.ok) {
              const data = await response.json().catch(() => ({}));
              throw new Error(data.error || 'Login failed');
            }
            const result = await response.json();
            sessionStorage.setItem('firebaseToken', result.token);
            sessionStorage.setItem('firebaseUid', result.user.uid);
            sessionStorage.setItem('firebaseDisplayName', result.user.username || result.user.email);
            sessionStorage.setItem('firebaseEmail', result.user.email);
            window.location.replace('index.html');
          }
          return;
        }

        // Firebase Client SDK Mode
        if (authMode === 'signup') {
          const response = await fetch('/api/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: targetedEmail, username, password, firstName, lastName }),
          });
          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || 'Registration database setup failed');
          }
          // Log them in immediately via Firebase Client SDK
          await firebase.auth().signInWithEmailAndPassword(targetedEmail, password);
        } else {
          await firebase.auth().signInWithEmailAndPassword(targetedEmail, password);
        }

        const user = firebase.auth().currentUser;
        if (!user) throw new Error('Unable to establish authentication session.');

        const token = await user.getIdToken(true);
        sessionStorage.setItem('firebaseToken', token);
        sessionStorage.setItem('firebaseUid', user.uid);
        sessionStorage.setItem('firebaseEmail', user.email);
        sessionStorage.setItem('firebaseDisplayName', user.displayName || username || user.email);

        window.location.replace('index.html');
      } catch (error) {
        console.warn('Authentication error:', error);
        showError(error.message || 'Authentication failed');
      }
    }

    // Attach click listeners to the layout mode buttons
    loginModeBtn.addEventListener('click', () => setAuthMode('login'));
    signupModeBtn.addEventListener('click', () => setAuthMode('signup'));

    // Attach submit listener to the form element
    authForm.addEventListener('submit', handleAuthSubmit);

    // Auto-redirect if already authenticated via client-side state hooks
    if (isFirebaseReady()) {
      firebase.auth().onAuthStateChanged(user => {
        if (user) {
          window.location.replace('index.html');
        }
      });
    }
  </script>
</body>
</html>
