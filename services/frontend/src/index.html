<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriCoach — Feed</title>
  <link rel="stylesheet" href="styles.css" />
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
</head>

<body>
  <div class="app-shell">

    <!-- ── Main content ─────────────────────────────────────────────────── -->
    <div class="main-area">

      <header class="topbar">
        <button id="hamburgerBtn" class="hamburger" aria-label="Open menu">&#9776;</button>

        <button class="toggle-btn" id="toggle" aria-label="Toggle sidebar">
          <img src="https://i.pravatar.cc/48?img=47" alt="Profile" />
        </button>

        <div class="title-group">
          <span class="app-label">TriCoach</span>
          <h1>TriPosts</h1>
        </div>

        <button id="openCreateTrainingBtn" type="button" class="simulate_train">
          <div>
            <strong>🏃 Log a training</strong>
            <span>Record today's workout</span>
          </div>
        </button>
      </header>

      <!-- Slide-out menu -->
      <div id="menuPanel" class="menu-panel hidden" aria-hidden="true">
        <div class="menu-content">
          <h2>Menu</h2>
          <button id="newPostBtn"  class="menu-item">Create Post</button>
          <button id="workoutsMenuBtn" class="menu-item">My Workouts</button>
          <button id="aiMenuBtn"   class="menu-item">🔮 AI Analyzer</button>
          <button id="draftsBtn"   class="menu-item">Drafts</button>
          <button id="settingsBtn" class="menu-item">Settings</button>
        </div>
      </div>

      <!-- Feed filter pills -->
      <div class="action-bar">
        <button id="openCreatePostBtn" class="action-pill active">New Post</button>
        <button class="action-pill">Following</button>
        <button class="action-pill">Popular</button>
        <button class="action-pill">New</button>
      </div>

      <!-- Post feed -->
      <main class="feed">
        <div id="postsContainer" class="posts-container">
          <div class="empty-state">Loading posts…</div>
        </div>
      </main>

    </div>

    <!-- ── Sidebar ───────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebarHid">
      <div class="sidebar-card">
        <h2>Profile</h2>
        <div class="profile-card">
          <button class="profileBtn" id="profileBtn" aria-label="View profile">
            <img src="https://i.pravatar.cc/80?img=47" alt="Profile" />
          </button>
          <div>
            <strong>Jane Doe</strong>
            <span>@janedoe</span>
          </div>
        </div>
      </div>

      <div class="sidebar-card">
        <h2>Trending</h2>
        <ul>
          <li>#frontend</li>
          <li>#microservices</li>
          <li>#triathlon</li>
          <li>#performance</li>
        </ul>
      </div>

      <div class="sidebar-card">
        <h2>Options</h2>
        <ul>
          <li>Settings</li>
          <li>Notifications</li>
          <li>Help</li>
        </ul>
      </div>
    </aside>

  </div>

  <!-- Overlay — tapping it closes the sidebar on mobile -->
  <div id="overlay" class="overlay"></div>

  <!-- ── Create Post modal ─────────────────────────────────────────────────── -->
  <div id="createPostModal" class="modal-overlay hidden">
    <div class="modal-content">
      <header class="modal-header">
        <h2>Create Post</h2>
        <button id="closePostModalBtn" class="menu-close" aria-label="Close">×</button>
      </header>
      <div class="modal-body">
        <textarea id="postContentInput" placeholder="How was your training today?"></textarea>
        <div class="workout-selector">
          <label for="workoutSelect">Attach a Training:</label>
          <select id="workoutSelect">
            <option value="">Loading…</option>
          </select>
        </div>
      </div>
      <footer class="modal-actions">
        <button id="submitPostBtn" class="action-pill active">Post</button>
      </footer>
    </div>
  </div>

  <!-- ── Log Training modal ────────────────────────────────────────────────── -->
  <div id="createTrainingModal" class="modal-overlay hidden">
    <div class="modal-content">
      <header class="modal-header">
        <h2>Log Training</h2>
        <button id="closeTrainingModalBtn" class="menu-close" aria-label="Close">×</button>
      </header>
      <div class="modal-body">
        <div class="workout-selector">
          <label for="trainingType">Type</label>
          <select id="trainingType">
            <option value="">Select a type</option>
            <option value="run">Run</option>
            <option value="ride">Ride</option>
            <option value="swim">Swim</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="workout-selector">
          <label for="trainingDuration">Duration (minutes)</label>
          <input id="trainingDuration" type="number" min="1" placeholder="e.g. 45" />
        </div>
        <div class="workout-selector">
          <label for="trainingDistance">Distance (km)</label>
          <input id="trainingDistance" type="number" min="0" step="0.01" placeholder="e.g. 5.00" />
        </div>
      </div>
      <footer class="modal-actions">
        <button id="submitTrainingBtn" class="action-pill active">Save Training</button>
      </footer>
    </div>
  </div>

  <script src="frontendtest.js"></script>
</body>
</html>
