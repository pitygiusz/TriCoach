<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TriCoach - AI History</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

</head>

<body>
  <div class="app-shell">

    <div class="main-area">

      <header class="topbar">
        <button onclick="window.location.href='index.html'" class="hamburger" aria-label="Go back">←</button>

        <div class="title-group">
          <span class="app-label">TriCoach</span>
          <h1>AI History</h1>
        </div>
      </header>

      <section id="analysisIntroSection" class="post-card" style="margin-bottom: 8px;">
        <h3>AI History Critique</h3>
        <p style="color: var(--muted); margin-bottom: 20px;">
          Our AI coach analyzes your logged workout consistency, pacing trends, and disciplines distribution over your recent training history, offering professional critiques and actionable advice.
        </p>

        <button id="runAiAnalysisBtn" class="action-pill active" style="width: 100%; font-weight: bold; padding: 14px;">
          🔮 Run AI History Analysis
        </button>
      </section>

      <div id="aiResultArea" class="posts-container">
        <div class="empty-state">Click the button to generate your AI coaching critique.</div>
      </div>

    </div>

    <!-- ── Sidebar ───────────────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebarHid"></aside>

  </div>

  <script src="shell.js"></script>
  <script>
    try {
      if (typeof firebase !== 'undefined' && !firebase.apps.length) {
        const config = window.__FIREBASE_CONFIG__;
        if (config && config.apiKey) {
          firebase.initializeApp(config);
        } else {
          console.warn('🔥 Firebase config missing or incomplete');
        }
      }
    } catch (e) {
      console.warn('🔥 Firebase init error:', e.message);
    }

    const runAiAnalysisBtn = document.getElementById('runAiAnalysisBtn');
    const aiResultArea = document.getElementById('aiResultArea');
    const analysisIntroSection = document.getElementById('analysisIntroSection');

    // ─── Load Latest Analysis ─────────────────────────────────────────────────
    async function loadLatestAnalysis() {
      const uid = getCurrentUserId();
      if (!uid) return;

      try {
        const authHeaders = await getAuthHeaders();
        const res = await fetch(`/api/analytics/analyses/${uid}`, {
          headers: authHeaders
        });
        if (!res.ok) {
          throw new Error(`Failed to load analysis. Status: ${res.status}`);
        }
        const data = await res.json();
        
        if (data.analysis && data.analysis.analysis) {
          analysisIntroSection.style.display = 'none';
          renderAnalysisDetails(data.analysis.analysis, data.analysis.createdAt);
        } else {
          analysisIntroSection.style.display = 'block';
          aiResultArea.innerHTML = `
            <div class="empty-state">Click the button to generate your AI coaching critique.</div>
          `;
        }
      } catch (err) {
        console.error('Failed to load latest analysis:', err);
        analysisIntroSection.style.display = 'block';
        aiResultArea.innerHTML = `
          <div class="error-state">
            <p>Failed to load latest analysis</p>
            <span style="font-size: 0.9rem;">${err.message}</span>
          </div>
        `;
      }
    }

    function renderAnalysisDetails(analysis, createdAt) {
      const dateStr = createdAt ? new Date(createdAt).toLocaleDateString(undefined, { dateStyle: 'medium' }) : 'Recent';
      
      const keyFindingsHtml = (analysis.key_findings || []).map(f => `
        <li style="margin-bottom: 12px; font-size: 1.05rem; display: flex; align-items: start; gap: 10px; line-height: 1.5;">
          <span style="color: var(--primary); font-size: 1.2rem;">✔</span>
          <span style="color: var(--text);">${f}</span>
        </li>
      `).join('');

      const recommendationsHtml = (analysis.recommendations || []).map(r => `
        <li style="margin-bottom: 12px; font-size: 1.05rem; display: flex; align-items: start; gap: 10px; line-height: 1.5;">
          <span style="color: var(--gold); font-size: 1.2rem;">⚡</span>
          <span style="color: var(--text);">${r}</span>
        </li>
      `).join('');

      aiResultArea.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px;">
          <h3 style="margin: 0;">Saved Critique (${dateStr})</h3>
          <button id="triggerNewAnalysisBtn" class="action-pill active" style="font-weight: bold; padding: 10px 18px; font-size: 0.9rem;">
            🔄 Generate New Analysis
          </button>
        </div>

        <article class="post-card" style="border-left: 5px solid var(--primary); margin-bottom: 16px;">
          <header>
            <div style="font-size: 2.5rem; margin-right: 12px;">🧠</div>
            <div class="post-author">
              <strong>AI Coaching Critique</strong>
              <span>Based on ${analysis.total_workouts || 0} workouts analyzed</span>
            </div>
          </header>
          
          <div style="line-height: 1.8; margin-top: 14px; background: var(--surface-strong); border-radius: 16px; padding: 18px;">
            <strong style="color: var(--primary); display: block; margin-bottom: 8px; font-size: 1.1rem;">📋 Critique:</strong>
            <p style="margin: 0; font-size: 1.05rem; white-space: pre-line;">${analysis.coaching_critique || 'No critique text.'}</p>
          </div>
        </article>

        <article class="post-card" style="border-left: 5px solid var(--primary); margin-bottom: 16px;">
          <header>
            <div style="font-size: 2.5rem; margin-right: 12px;">🔍</div>
            <div class="post-author">
              <strong>Key Findings</strong>
              <span>Observations from recent sessions</span>
            </div>
          </header>
          <ul style="list-style: none; padding: 0; margin: 18px 0 0 0;">
            ${keyFindingsHtml}
          </ul>
        </article>

        <article class="post-card" style="border-left: 5px solid var(--gold); margin-bottom: 16px;">
          <header>
            <div style="font-size: 2.5rem; margin-right: 12px;">💡</div>
            <div class="post-author">
              <strong>Actionable Recommendations</strong>
              <span>Suggested steps for next cycles</span>
            </div>
          </header>
          <ul style="list-style: none; padding: 0; margin: 18px 0 0 0;">
            ${recommendationsHtml}
          </ul>
        </article>
      `;

      document.getElementById('triggerNewAnalysisBtn').addEventListener('click', () => {
        analysisIntroSection.style.display = 'block';
        aiResultArea.innerHTML = `
          <div class="empty-state">Click the button to generate your AI coaching critique.</div>
        `;
        analysisIntroSection.scrollIntoView({ behavior: 'smooth' });
      });
    }

    // ─── Trigger AI History Analysis ──────────────────────────────────────────
    async function triggerAnalysisGeneration() {
      const uid = getCurrentUserId();
      if (!uid) {
        window.location.replace('login.html');
        return;
      }

      analysisIntroSection.style.display = 'none';

      aiResultArea.innerHTML = `
        <div class="empty-state">
          <p style="font-size: 1.2rem; font-weight: bold; margin-bottom: 8px;">⏳ AI Coach is analyzing your training history...</p>
          <p style="color: var(--muted);">This might take a moment as our LLM reviews consistency, volume distribution, and pacing trends.</p>
        </div>
      `;

      try {
        const authHeaders = await getAuthHeaders();
        const res = await fetch('/api/analytics/analyze-ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify({
            user_id: uid
          })
        });

        if (!res.ok) {
          const errBody = await res.json().catch(() => ({}));
          throw new Error(errBody.error || `Server responded with ${res.status}`);
        }

        const data = await res.json();
        if (!data.success || !data.analysis) {
          throw new Error('Invalid response from AI history analyzer.');
        }

        const analysis = data.analysis;

        const saveRes = await fetch('/api/analytics/analyses', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders },
          body: JSON.stringify({
            user_id: uid,
            analysis: analysis
          })
        });

        if (saveRes.ok) {
          loadLatestAnalysis();
        } else {
          renderAnalysisDetails(analysis, new Date().toISOString());
        }

      } catch (err) {
        analysisIntroSection.style.display = 'block';
        aiResultArea.innerHTML = `
          <div class="error-state">
            <p>AI Analysis Failed</p>
            <span style="font-size: 0.9rem;">${err.message}</span>
          </div>
        `;
      }
    }

    runAiAnalysisBtn.addEventListener('click', triggerAnalysisGeneration);

    // ─── Bootstrap ────────────────────────────────────────────────────────────
    if (isFirebaseReady()) {
      firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
          sessionStorage.setItem('firebaseUid', user.uid);
          sessionStorage.setItem('firebaseDisplayName', user.displayName || user.email);
          sessionStorage.setItem('firebaseEmail', user.email);
        } else {
          sessionStorage.clear();
          window.location.replace('login.html');
        }
        updateProfileSidebar();
        loadLatestAnalysis();
      });
    } else {
      updateProfileSidebar();
      loadLatestAnalysis();
    }
  </script>
</body>
</html>
